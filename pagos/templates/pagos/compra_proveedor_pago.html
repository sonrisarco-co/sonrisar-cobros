{% extends "base.html" %}
{% block title %}Agregar pago proveedor | Sonrisar{% endblock %}

{% block content %}

<style>

.form-page{
    max-width:700px;
    margin:35px auto;
}

.form-card{
    background:white;
    border:1px solid #e5eef0;
    border-radius:24px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.form-page h2{
    font-size:32px;
    font-weight:600;
    margin-bottom:5px;
}

.subtitulo{
    color:#64748b;
    margin-bottom:25px;
}

.saldo-box{
    background:#f8fafc;
    border-radius:18px;
    padding:18px;
    margin-bottom:25px;
}

.saldo-box .saldo{
    font-size:24px;
    font-weight:700;
    color:#b91c1c;
}

.campo{
    margin-bottom:18px;
}

.campo label{
    display:block;
    font-weight:700;
    margin-bottom:7px;
    color:#334155;
}

.input-sonrisar{
    width:100%;
    height:46px;
    border:1px solid #dbe7ea;
    border-radius:14px;
    padding:10px 14px;
    font-size:15px;
}

textarea.input-sonrisar{
    height:95px;
    resize:vertical;
}

.check-box{
    background:#f8fafc;
    border-radius:16px;
    padding:14px;
    margin-bottom:20px;
}

.acciones{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.btn-sonrisar{
    background:#26ABA5;
    color:white;
    border:none;
    border-radius:16px;
    padding:11px 20px;
    font-weight:600;
}

.btn-cancelar{
    background:#f1f5f9;
    color:#334155;
    text-decoration:none;
    border-radius:16px;
    padding:11px 20px;
    font-weight:600;
}

</style>

<div class="form-page">

    <h2>Agregar pago</h2>

    <div class="subtitulo">
        Proveedor:
        <strong>{{ compra.proveedor }}</strong>
    </div>

    <div class="saldo-box">

        <div>
            Saldo pendiente
        </div>

        <div class="saldo">
            ${{ compra.saldo_pendiente|floatformat:2 }}
        </div>

    </div>

    <div class="form-card">

        <form method="POST">
            {% csrf_token %}

            <div class="campo">
                <label>Monto</label>

                <input
                    type="number"
                    step="0.01"
                    name="monto"
                    class="input-sonrisar"
                    required
                >
            </div>

            <div class="campo">
                <label>Método</label>

                <select
                    name="metodo"
                    class="input-sonrisar"
                    required
                >
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia</option>
                    <option value="tarjeta">Tarjeta</option>
                </select>
            </div>

            <div class="check-box">

                <input
                    type="checkbox"
                    name="afecta_caja"
                    id="afecta_caja"
                    checked
                >

                <label
                    for="afecta_caja"
                    style="margin-left:8px;font-weight:700;"
                >
                    Afecta caja del día
                </label>

            </div>

            <div class="campo">
                <label>Observaciones</label>

                <textarea
                    name="observaciones"
                    class="input-sonrisar"
                ></textarea>
            </div>

            <div class="acciones">

                <button
                    type="submit"
                    class="btn-sonrisar"
                >
                    Guardar pago
                </button>

                <a
                    href="{% url 'pagos:compra_proveedor_detalle' compra.id %}"
                    class="btn-cancelar"
                >
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
