{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo pago | Sonrisar</title>

    <link rel="stylesheet" href="{% static 'css/sonrisar-pro.css' %}">

    <style>

        *{
            box-sizing:border-box;
        }

        body{

            margin:0;

            background:#ffffff;

            font-family:
                Inter,
                sans-serif;

            color:#0f172a;
        }

        .layout{

            display:flex;

            gap:22px;

            padding:18px;

            min-height:100vh;
        }

        /* =========================
        SIDEBAR
        ========================== */

        .sidebar{

            width:230px;

            background:#ffffff;

            border:1px solid #edf1f4;

            border-radius:28px;

            padding:18px 16px;

            box-shadow:
                0 4px 18px rgba(15,23,42,.04);

            height:fit-content;

            position:sticky;

            top:20px;
        }

        .sidebar-logo{

            width:120px;

            display:block;

            margin:0 auto 18px auto;
        }

        .menu{

            display:flex;

            flex-direction:column;

            gap:8px;
        }

        .menu a{

            height:44px;

            border-radius:16px;

            display:flex;

            align-items:center;

            padding:0 16px;

            text-decoration:none;

            color:#334155;

            font-size:15px;

            font-weight:600;

            transition:.18s ease;
        }

        .menu a:hover{

            background:#f6fafb;
        }

        .menu a.active{

            background:#e9fbfa;

            color:#26ABA5;
        }

        /* =========================
        CONTENIDO
        ========================== */

        .content{

            flex:1;

            max-width:960px;
        }

        .title{

            font-size:30px;

            line-height:1;

            margin:6px 0 24px;

            font-weight:700;

            color:#0f172a;
        }

        /* =========================
        CARD
        ========================== */

        .card{

            position:relative;

            overflow:hidden;

            background:#ffffff;

            border:
                1px solid #edf1f4;

            border-radius:30px;

            padding:32px;

            box-shadow:
                0 4px 18px rgba(15,23,42,.04);
        }

        /* =========================
        MARCA AGUA
        ========================== */

        .watermark{

            position:absolute;

            inset:0;

            display:flex;

            align-items:center;

            justify-content:center;

            pointer-events:none;

            z-index:0;
        }

        .watermark img{

            width:720px;

            opacity:.1;

            position:fixed;
        }

        /* =========================
        FORM
        ========================== */

        .form{

            position:relative;

            z-index:2;
        }

        .group{

            margin-bottom:22px;
        }

        .group label{

            display:block;

            font-size:16px;

            font-weight:600;

            margin-bottom:10px;

            color:#0f172a;
        }

        .control{

            width:100%;

            height:45px;

            border-radius:14px;

            border:
                1px solid #dbe3ea;

            background:
                rgba(255,255,255,.72);

            padding:0 18px;

            font-size:16px;

            color:#334155;

            transition:.18s ease;
        }

        .control::placeholder{

            color:#94a3b8;
        }

        .control:focus{

            outline:none;

            border-color:#26ABA5;

            background:#ffffff;

            box-shadow:
                0 0 0 4px rgba(38,171,165,.08);
        }

        select.control{

            cursor:pointer;
        }

        /* =========================
        BOTON
        ========================== */

        .btn{

            width:40%;

            height:45px;

            border:none;

            border-radius:14px;

            background:
                linear-gradient(
                    135deg,
                    #25c7c4,
                    #1fb7d6
                );

            color:white;

            font-size:18px;

            font-weight:700;

            cursor:pointer;

            transition:.18s ease;

            box-shadow:
                0 6px 18px rgba(37,199,196,.16);
        }

        .btn:hover{

            transform:translateY(-1px);

            opacity:.87;
        }

        /* =========================
        MOBILE
        ========================== */

        @media(max-width:1100px){

            .layout{

                flex-direction:column;
            }

            .sidebar{

                width:100%;

                position:relative;

                top:0;
            }

            .title{

                font-size:34px;
            }

            .card{

                padding:24px;
            }

            .control{

                height:54px;

                font-size:15px;
            }

            .btn{

                height:50px;

                font-size:14px;
            }
        }

    </style>

</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <img
            src="{% static 'img/logo.png' %}"
            class="sidebar-logo"
        >

        <nav class="menu">

            <a href="/caja/">
                Caja
            </a>

            <a href="/pagos/historial/">
                Historial
            </a>

            <a href="/caja/cerradas/">
                Cajas cerradas
            </a>

            <a href="/reportes/selector/">
                Reportes
            </a>

            <a
                href="/pagos/nuevo/"
                class="active"
            >
                Nuevo pago
            </a>

        </nav>

    </aside>

    <!-- CONTENIDO -->

    <main class="content">

        <h1 class="title">
            Nuevo pago
        </h1>

        <section class="card">

            <!-- MARCA DE AGUA -->

            <div class="watermark">

                <img
                    src="{% static 'img/logo.png' %}"
                >

            </div>

            <!-- FORM -->

            <form
                method="POST"
                class="form"
            >

                {% csrf_token %}

                <input type="hidden" name="next" value="{{ initial.next }}">
                <input type="hidden" name="appointment_id" value="{{ initial.appointment_id }}">
                <input type="hidden" name="patient_id" value="{{ initial.patient_id }}">

                <div class="group">

                    <label>
                        Monto
                    </label>

                    <input
                        type="number"
                        name="monto"
                        step="0.01"
                        placeholder="0.00"
                        class="control"
                        value="{{ initial.monto }}"
                        required
                    >

                </div>

                <div class="group">

                    <label>
                        Paciente
                    </label>

                    <input
                        type="text"
                        name="paciente"
                        placeholder="Ej: Luis Hernández"
                        class="control"
                        value="{{ initial.paciente }}"
                        required
                    >

                </div>

                <div class="group">

                    <label>
                        Concepto
                    </label>

                    <input
                        type="text"
                        name="concepto"
                        placeholder="Ej: Control / Ortodoncia / Limpieza"
                        class="control"
                        value="{{ initial.concepto }}"
                        required
                    >

                </div>

                <div class="group">

                    <label>
                        Método de pago
                    </label>

                    <select
                        name="metodo"
                        class="control"
                        required
                    >

                        <option value="">
                            Seleccionar método
                        </option>

                        <option
                            value="efectivo"
                            {% if initial.metodo == "efectivo" %}selected{% endif %}
                        >
                            Efectivo
                        </option>

                        <option
                            value="tarjeta"
                            {% if initial.metodo == "tarjeta" %}selected{% endif %}
                        >
                            Tarjeta
                        </option>

                        <option
                            value="transferencia"
                            {% if initial.metodo == "transferencia" %}selected{% endif %}
                        >
                            Transferencia
                        </option>

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn"
                >
                    Registrar pago
                </button>

            </form>

        </section>

    </main>

</div>

</body>
</html>
