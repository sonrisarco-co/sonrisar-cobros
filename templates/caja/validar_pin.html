{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIN de acceso</title>

    <link rel="stylesheet" href="{% static 'css/sonrisar-pro.css' %}">

    <style>

        body{
            background:#f4f7fb;
            font-family:Arial, sans-serif;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
        }

        .pin-card{
            background:white;
            width:100%;
            max-width:380px;
            padding:35px;
            border-radius:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            text-align:center;
        }

        .pin-card h1{
            font-size:28px;
            margin-bottom:10px;
            color:#1f2937;
        }

        .pin-card p{
            color:#6b7280;
            margin-bottom:25px;
        }

        .pin-input{
            width:100%;
            padding:16px;
            border-radius:16px;
            border:1px solid #dbe2ea;
            font-size:22px;
            text-align:center;
            letter-spacing:6px;
            outline:none;
            margin-bottom:20px;
        }

        .btn-pin{
            width:100%;
            border:none;
            background:#26ABA5;
            color:white;
            padding:15px;
            border-radius:16px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        .error{
            color:#dc2626;
            margin-bottom:15px;
        }

    </style>
</head>
<body>

<div class="pin-card">

    <h1>🔒 Acceso restringido</h1>

    <p>
        Ingrese PIN administrador
    </p>

    {% if messages %}
        {% for message in messages %}
            <div class="error">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="password"
            name="pin"
            class="pin-input"
            maxlength="10"
            autofocus
        >

        <input
            type="hidden"
            name="next"
            value="{{ next }}"
        >

        <button type="submit" class="btn-pin">
            Entrar
        </button>

    </form>

</div>

</body>
</html>
