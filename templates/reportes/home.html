{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Reportes | Sonrisar
    </title>

    <link
        rel="stylesheet"
        href="{% static 'css/sonrisar-pro.css' %}"
    >

    <style>

        *{
            box-sizing:border-box;
        }

        body{

            margin:0;

            background:#ffffff;

            font-family:
                Inter,
                sans-serif;

            color:#0f172a;

            overflow-x:hidden;
        }

        /* =========================
           MARCA DE AGUA GLOBAL
        ========================== */

        body::before{

            content:"";

            position:fixed;

            inset:0;

            background:
                url("{% static 'img/logo.png' %}")
                center center / 950px
                no-repeat;

            opacity:.04;

            pointer-events:none;

            z-index:0;
        }

        /* =========================
           LAYOUT
        ========================== */

        .layout{

            position:relative;

            z-index:2;

            display:flex;

            gap:24px;

            padding:20px;

            min-height:100vh;
        }

        /* =========================
           SIDEBAR
        ========================== */

        .sidebar{

            width:230px;

            min-width:230px;

            background:#ffffff;

            border:
                1px solid #edf1f4;

            border-radius:32px;

            padding:22px 18px;

            box-shadow:
                0 6px 22px rgba(15,23,42,.04);

            height:fit-content;

            position:sticky;

            top:18px;
        }

        .sidebar-logo{

            width:130px;

            display:block;

            margin:4px auto 24px auto;
        }

        .menu{

            display:flex;

            flex-direction:column;

            gap:8px;
        }

        .menu a{

            height:48px;

            border-radius:16px;

            display:flex;

            align-items:center;

            padding:0 18px;

            text-decoration:none;

            color:#334155;

            font-size:15px;

            font-weight:600;

            transition:.18s ease;
        }

        .menu a:hover{

            background:#f5fbfb;
        }

        .menu a.active{

            background:#dff8f7;

            color:#119e99;
        }

        /* =========================
           CONTENT
        ========================== */

        .content{

            flex:1;

            max-width:900px;
        }

        .title{

            font-size:42px;

            font-weight:800;

            margin:0 0 10px;

            letter-spacing:-1px;

            color:#0f172a;
        }

        .subtitle{

            color:#64748b;

            font-size:16px;

            margin-bottom:28px;
        }

        /* =========================
           CARD
        ========================== */

        .card{

            position:relative;

            overflow:hidden;

            background:
                rgba(255,255,255,.72);

            backdrop-filter:blur(10px);

            border:
                1px solid #edf1f4;

            border-radius:32px;

            padding:34px;

            box-shadow:
                0 8px 26px rgba(15,23,42,.04);
        }

        /* =========================
           ACTIONS
        ========================== */

        .actions{

            display:grid;

            grid-template-columns:
                repeat(auto-fit,minmax(260px,1fr));

            gap:18px;
        }

        .action-card{

            display:flex;

            align-items:center;

            gap:16px;

            padding:22px;

            border-radius:24px;

            text-decoration:none;

            background:
                rgba(248,250,252,.72);

            border:
                1px solid #eef2f6;

            transition:.18s ease;

            min-height:110px;
        }

        .action-card:hover{

            transform:translateY(-2px);

            background:#ffffff;

            box-shadow:
                0 8px 22px rgba(15,23,42,.05);
        }

        .icon{

            width:58px;

            height:58px;

            border-radius:18px;

            background:
                linear-gradient(
                    135deg,
                    #25c7c4,
                    #1fb7d6
                );

            display:flex;

            align-items:center;

            justify-content:center;

            color:white;

            font-size:28px;

            flex-shrink:0;

            box-shadow:
                0 8px 18px rgba(37,199,196,.18);
        }

        .action-content{

            flex:1;
        }

        .action-title{

            font-size:18px;

            font-weight:700;

            color:#0f172a;

            margin-bottom:6px;
        }

        .action-desc{

            font-size:14px;

            color:#64748b;

            line-height:1.4;
        }

        /* =========================
           MOBILE
        ========================== */

        @media(max-width:1100px){

            .layout{

                flex-direction:column;
            }

            .sidebar{

                width:100%;

                min-width:100%;

                position:relative;

                top:0;
            }

            .title{

                font-size:34px;
            }

            .card{

                padding:24px;
            }
        }

    </style>

</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <img
            src="{% static 'img/logo.png' %}"
            class="sidebar-logo"
        >

        <nav class="menu">

            <a href="/caja/">
                Caja
            </a>

            <a href="/pagos/historial/">
                Historial
            </a>

            <a href="/caja/cerradas/">
                Cajas cerradas
            </a>

            <a
                href="/reportes/selector/"
                class="active"
            >
                Reportes
            </a>

            <a href="/pagos/gastos/nuevo/">
                Nuevo gasto
            </a>

        </nav>

    </aside>

    <!-- CONTENT -->

    <main class="content">

        <h1 class="title">
            Reportes
        </h1>

        <div class="subtitle">
            Selecciona una opción disponible
        </div>

        <section class="card">

            <div class="actions">

                <!-- REPORTE MENSUAL -->

                <a
                    href="/reportes/2026/1/"
                    class="action-card"
                >

                    <div class="icon">
                        📊
                    </div>

                    <div class="action-content">

                        <div class="action-title">
                            Reporte mensual
                        </div>

                        <div class="action-desc">
                            Visualiza ingresos, gastos y movimientos del mes.
                        </div>

                    </div>

                </a>

            </div>

        </section>

    </main>

</div>

</body>
</html>
